<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cyber-Zen Oracle | 蓮花天使啟示錄</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <meta property="og:title" content="Cyber-Zen Oracle | 領取你的專屬蓮花祝福">
    <meta property="og:description" content="當下即是啟示。抽一個天使數字，對齊你的靈性頻率，感受蓮花的安寧能量。">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://axmy13.github.io/myoracle/og-image.jpg">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #ffd700;
            font-family: 'Cinzel', serif;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 30px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
            max-width: 90%;
            width: 400px;
        }

        /* 新增：Logo 樣式與動畫 */
        .logo-container {
            margin-bottom: 10px;
        }
        .logo-img {
            width: 80px; /* 調整 Logo 大小 */
            height: auto;
            filter: drop-shadow(0 0 10px #ffd700);
            animation: logoPulse 5s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px #ffd700); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 15px #ffd700) brightness(1.1); }
        }

        .number {
            font-size: 90px;
            font-weight: 700;
            letter-spacing: 12px;
            margin: 0;
            text-shadow: 0 0 15px #ffd700, 0 0 30px #b8860b;
            transition: all 0.5s ease;
        }

        .keyword {
            margin-top: 15px;
            font-size: 20px;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px #ffd700;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        /* 新增：深度解說區塊樣式 */
        .description-box {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
            line-height: 1.8;
            min-height: 80px; /* 預留文字空間 */
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
            margin-bottom: 20px;
        }
        .description-box.active {
            opacity: 1;
            transform: translateY(0);
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 35px;
            font-size: 16px;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            width: 100%;
            max-width: 300px;
            text-transform: uppercase;
        }

        .draw-btn {
            background: transparent;
            color: #ffd700;
            border: 1px solid #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .draw-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .share-btn {
            background: linear-gradient(45deg, #ffd700, #b8860b);
            color: #000;
            border: none;
            font-weight: 700;
        }

        .share-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
        }

        .footer-note {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            opacity: 0.3;
            letter-spacing: 2px;
            width: 100%;
            text-align: center;
            left: 0;
        }
    </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
    <div class="logo-container">
        <img src="logo.png" alt="Lotus Logo" class="logo-img">
    </div>

    <div class="number" id="number">---</div>
    <div class="keyword" id="keyword">Awaiting Inspiration</div>
    
    <div class="description-box" id="description">當下即是啟示。抽一個天使數字，同步你的靈性頻率，感受蓮花的安寧能量。</div>

    <div class="buttons">
        <button class="draw-btn" onclick="draw()">Draw | 抽取啟示</button>
        <button class="share-btn" onclick="share()">Share Blessing | 分享好運</button>
    </div>
</div>

<div class="footer-note">CYBER-ZEN ORACLE © 2026</div>

<script>
// 優化：新增深度解說文字 data
const data = [
    {n:"111", k:"MANIFESTATION | 顯化", d:"「你的思想正在轉化為現實。保持高頻的正面思考，宇宙正準備顯化你的願景。」"},
    {n:"222", k:"ALIGNMENT | 對齊", d:"「凡事皆有最好的安排。信任你的道路，你現在正處於對的時間與對的地點。」"},
    {n:"333", k:"ASCENSION | 揚升", d:"「大師與守護者正圍繞著你。祂們正在提供導引與保護，確認你內在的靈性力量。」"},
    {n:"444", k:"SANCTUARY | 庇護", d:"「宇宙正溫柔地擁抱你。你被無條件的愛與光所包圍，請放下焦慮，感受這份安寧。」"},
    {n:"555", k:"EVOLUTION | 進化", d:"「巨大的變革即將到來。這是為了讓你進化成更好的版本，勇敢地迎接這個轉變吧。」"},
    {n:"666", k:"REFLECT | 映照", d:"「是時候平衡你的靈性與物質生活了。回歸內在，清理多餘的執著，找回內心的平靜。」"},
    {n:"777", k:"SYNCHRONICITY | 共時", d:"「幸運正與你共振。你與宇宙的脈動已同步，意想不到的奇蹟即將在生活中發生。」"},
    {n:"888", k:"ABUNDANCE | 豐盛", d:"「無限的財富與機遇正流向你。這是對你過去努力的顯化，感恩並喜悅地顯化這份豐盛。」"},
    {n:"999", k:"REBIRTH | 重生", d:"「一個階段的圓滿結束。這不是終點，而是另一個輝煌篇章的開始，準備好展翅高飛。」"}
];

const numberEl = document.getElementById("number");
const keywordEl = document.getElementById("keyword");
const descriptionEl = document.getElementById("description");

function draw(){
    // 隱藏描述
    descriptionEl.classList.remove("active");

    let count = 0;
    const interval = setInterval(() => {
        numberEl.innerText = Math.floor(Math.random()*900 + 100);
        count++;
        if(count > 10) {
            clearInterval(interval);
            const item = data[Math.floor(Math.random()*data.length)];
            numberEl.innerText = item.n;
            keywordEl.innerText = item.k;
            // 顯示深度描述
            descriptionEl.innerText = item.d;
            setTimeout(() => { descriptionEl.classList.add("active"); }, 200);
            triggerEffect();
        }
    }, 50);
}

function share(){
    const currentNumber = numberEl.innerText;
    if(currentNumber === "---") {
        alert("請先抽取你的天使數字再分享喔！");
        return;
    }
    const currentDescription = descriptionEl.innerText;
    const url = window.location.href;
    // 分享時帶上數字
    const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent("我抽取了天使數字 " + currentNumber + "！" + currentDescription)}`;
    window.open(fbUrl, '_blank');
}

/* ===== Canvas Effects (保持原有的動效邏輯並稍作優化) ===== */

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
let animation;

resize();
window.addEventListener("resize", resize);
function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function triggerEffect(){
    cancelAnimationFrame(animation);
    const type = Math.floor(Math.random()*4);
    if(type === 0) pillarEffect();
    if(type === 1) infinityEffect();
    if(type === 2) spiralEffect();
    if(type === 3) pulseEffect();
}

function pillarEffect(){
    let y = canvas.height;
    function animate(){
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "#ffd700";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, y);
        ctx.lineTo(canvas.width/2, y-200);
        ctx.stroke();
        y -= 20;
        if(y < 0) y = canvas.height;
        animation = requestAnimationFrame(animate);
    }
    animate();
}

function infinityEffect(){
    let t = 0;
    function animate(){
        ctx.fillStyle = "rgba(0,0,0,0.05)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "#ffd700";
        ctx.beginPath();
        for(let i=0;i<100;i++){
            let x = canvas.width/2 + Math.sin(i*0.2+t)*200;
            let y = canvas.height/2 + Math.cos(i*0.1+t)*100;
            ctx.lineTo(x,y);
        }
        ctx.stroke();
        t += 0.02;
        animation = requestAnimationFrame(animate);
    }
    animate();
}

function spiralEffect(){
    let angle = 0;
    function animate(){
        ctx.fillStyle = "rgba(0,0,0,0.08)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = "#ffd700";
        for(let i=0;i<150;i++){
            let r = i * 2;
            let x = canvas.width/2 + r * Math.cos(i*0.15 + angle);
            let y = canvas.height/2 + r * Math.sin(i*0.15 + angle);
            ctx.lineTo(x,y);
        }
        ctx.stroke();
        angle += 0.03;
        animation = requestAnimationFrame(animate);
    }
    animate();
}

function pulseEffect(){
    let radius = 0;
    function animate(){
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2, radius, 0, Math.PI*2);
        ctx.strokeStyle = "rgba(255, 215, 0, " + (1 - radius/500) + ")";
        ctx.stroke();
        radius += 4;
        if(radius > 500) radius = 0;
        animation = requestAnimationFrame(animate);
    }
    animate();
}
</script>

</body>
</html>
