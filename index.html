<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辛言解憂站 | 數字頻率感應</title>

    <meta property="og:title" content="👉 點擊開啟：領取你的鳳凰啟示">
    <meta property="og:description" content="閉上雙眼，感應宇宙頻率。當下跳出的數字，就是給你的回應。">
    <meta property="og:url" content="https://axmy13.github.io/myoracle/">
    <meta property="og:image" content="https://axmy13.github.io/myoracle/logo.png">

    <style>
        body {
            background-color: #0a0a0a;
            color: #d4af37;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            width: 85%;
            max-width: 400px;
        }
        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
            border-radius: 50%;
            border: 1px solid #d4af37;
        }
        #result {
            font-size: 4rem;
            font-weight: bold;
            margin: 10px 0;
            transition: 0.5s;
        }
        #message {
            font-size: 1.1rem;
            color: #fff;
            min-height: 3em;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .btn-gold {
            background: linear-gradient(45deg, #d4af37, #f2d472);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .angel-effect {
            color: #fff;
            text-shadow: 0 0 20px #d4af37;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Logo" class="logo">
    <h1 style="font-size: 1.4rem;">辛言解憂站</h1>
    
    <div id="result">???</div>
    <div id="message">默唸你的困惑，按下按鈕開啟感應</div>

    <button class="btn-gold" onclick="generateNumber()">✨ 開啟感應 ✨</button>
</div>

<script>
    const interpretations = {
        angel: "這是強大的天使數字！宇宙正全力支持你的決定，保持正念。",
        high: "頻率持續上升中。近期適合開啟新計畫，勇敢踏出第一步。",
        mid: "波動平穩。當下需要的是耐心，美好的事物正在醞釀中。",
        low: "回歸內在。這是一個提醒你放慢腳步、傾聽內心聲音的時刻。",
        pair: "雙生頻率現蹤。留意身邊的合作機會或情感連結。"
    };

    function generateNumber() {
        const resultDiv = document.getElementById('result');
        const msgDiv = document.getElementById('message');
        
        // 產生 100-999 隨機數
        const num = Math.floor(Math.random() * 900) + 100;
        resultDiv.innerText = num;

        // 邏輯判斷：文字隨數字改變
        if (num % 111 === 0) {
            // 天使數字 (111, 222...)
            resultDiv.className = 'angel-effect';
            msgDiv.innerText = interpretations.angel;
        } else if (num % 10 === (Math.floor(num / 10) % 10)) {
            // 後兩位相同 (如 122, 588)
            resultDiv.className = '';
            msgDiv.innerText = interpretations.pair;
        } else if (num > 700) {
            resultDiv.className = '';
            msgDiv.innerText = interpretations.high;
        } else if (num > 400) {
            resultDiv.className = '';
            msgDiv.innerText = interpretations.mid;
        } else {
            resultDiv.className = '';
            msgDiv.innerText = interpretations.low;
        }
    }
</script>

</body>
</html>
