<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辛言解憂站 | 數字頻率感應實驗室</title>

    <meta property="og:title" content="👉 領取你的鳳凰啟示：數字頻率感應">
    <meta property="og:description" content="閉上雙眼，感應宇宙。當下跳出的數字，就是給你的解憂回應。✨">
    <meta property="og:url" content="https://axmy13.github.io/myoracle/">
    <meta property="og:image" content="https://axmy13.github.io/myoracle/logo.png">
    <meta property="og:type" content="website">

    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--gold); font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        
        .container { 
            text-align: center; background: rgba(20, 20, 20, 0.95); 
            padding: 40px 25px; border-radius: 24px; border: 1px solid var(--gold); 
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); width: 88%; max-width: 400px; 
            position: relative; z-index: 2;
        }

        .logo { width: 110px; height: 110px; margin-bottom: 15px; border-radius: 50%; border: 1px solid var(--gold); box-shadow: 0 0 15px var(--gold); }
        
        #result { 
            font-size: 5rem; font-weight: bold; margin: 10px 0; height: 120px; 
            display: flex; align-items: center; justify-content: center; 
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4); 
        }

        #message { font-size: 1.1rem; color: #fff; min-height: 4.5em; margin-bottom: 25px; line-height: 1.7; padding: 0 15px; }

        .btn-gold { 
            background: linear-gradient(45deg, #d4af37, #f2d472); color: #000; 
            border: none; padding: 15px 0; font-size: 1.2rem; border-radius: 50px; 
            cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
        }
        .btn-gold:active { transform: scale(0.96); }

        .btn-share { 
            background: transparent; color: var(--gold); border: 1px solid var(--gold); 
            padding: 10px 0; font-size: 0.95rem; border-radius: 50px; cursor: pointer; 
            width: 100%; margin-top: 15px; font-weight: bold;
        }

        .nav-link { color: #888; text-decoration: none; font-size: 0.85rem; margin-top: 25px; display: block; border-bottom: 1px solid transparent; }
        .nav-link:hover { color: var(--gold); }

        /* 天使數字發光特效 */
        .angel { color: #fff; text-shadow: 0 0 30px var(--gold); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Phoenix" class="logo">
    <h2 style="margin: 0; font-size: 1.4rem; letter-spacing: 2px;">解憂占卜站</h2>
    
    <div id="result">???</div>
    <div id="message">請先平靜內心，默唸困惑...</div>

    <button class="btn-gold" onclick="startOracle()">✨ 開始感應頻率 ✨</button>
    <button class="btn-share" onclick="shareToFB()">📢 分享這份啟示</button>
    
    <a href="https://www.facebook.com/profile.php?id=61582018845158" target="_blank" class="nav-link">← 返回辛言解憂站 FB 專頁</a>
</div>

<script>
    // 組合式文案庫：讓 900 個數字都有不同感覺
    const oracleData = {
        action: ["宇宙提示你要", "現在是時候去", "請嘗試著", "你被賦予力量去", "建議你保持", "冥冥中引導你", "目前的能量適合"],
        target: ["放下過去的執著", "迎接即將到來的機會", "信任你的直覺判斷", "尋找內心的平靜", "與身邊的人和解", "大膽嘗試新的計畫", "重新定義你的目標", "釋放內在的壓抑"],
        ending: ["，一切自有最好的安排。", "，鳳凰終將浴火重生。", "，好運就在轉角處。", "，你的頻率正在提升。", "，請靜候顯化的奇蹟。", "，不要恐懼未知的改變。"]
    };

    function startOracle() {
        const resEl = document.getElementById('result');
        const msgEl = document.getElementById('message');
        
        // 數字滾動效果
        let count = 0;
        const timer = setInterval(() => {
            resEl.innerText = Math.floor(Math.random() * 900) + 100;
            count++;
            if (count > 10) {
                clearInterval(timer);
                finalize();
            }
        }, 50);

        function finalize() {
            const num = Math.floor(Math.random() * 900) + 100;
            resEl.innerText = num;
            
            // 判斷是否為天使數字 (111, 222...)
            const isAngel = (num % 111 === 0);
            resEl.className = isAngel ? 'angel' : '';

            // 隨機組合文案
            const a = oracleData.action[Math.floor(Math.random() * oracleData.action.length)];
            const t = oracleData.target[Math.floor(Math.random() * oracleData.target.length)];
            const e = oracleData.ending[Math.floor(Math.random() * oracleData.ending.length)];
            
            if (isAngel) {
                msgEl.innerHTML = `<b style="color:#d4af37">【天使數字啟示】</b><br>強大的神聖連結！${a}${t}${e}`;
            } else {
                msgEl.innerText = `${a}${t}${e}`;
            }
        }
    }

    function shareToFB() {
        const url = encodeURIComponent(window.location.href);
        const quote = encodeURIComponent("我在【辛言解憂站】領取了專屬數字啟示，這份感應真的太準了！✨");
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${quote}`, '_blank');
    }
</script>

</body>
</html>
