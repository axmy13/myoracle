<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辛言解憂站 | 金鳳凰重生感應</title>
    <style>
        :root { --gold: #D1A75D; --bg: #05070A; }
        body { background: var(--bg); color: var(--gold); font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { text-align: center; background: rgba(15, 18, 24, 0.98); padding: 40px 25px; border-radius: 28px; border: 1px solid rgba(209, 167, 93, 0.3); box-shadow: 0 25px 50px rgba(0,0,0,0.8); width: 100%; max-width: 450px; }
        
        /* 替換原本的火焰，改用金鳳凰圖 */
        .phoenix-image { 
            width: 180px; height: 180px; margin: 0 auto 10px; 
            background: url('1000056891.png') no-repeat center center;
            background-size: contain;
            filter: drop-shadow(0 0 15px rgba(209, 167, 93, 0.5));
            cursor: pointer; transition: 0.5s;
            animation: breathe 3s infinite ease-in-out;
        }
        .phoenix-image:hover { filter: drop-shadow(0 0 25px var(--gold)); transform: scale(1.05); }
        .phoenix-image:active { transform: scale(0.9); }

        @keyframes breathe {
            0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 10px rgba(209, 167, 93, 0.3)); }
            50% { opacity: 1; filter: drop-shadow(0 0 30px rgba(209, 167, 93, 0.8)); }
        }
        
        #number-display { font-size: 4.5rem; font-weight: bold; margin: 10px 0; color: #fff; text-shadow: 0 0 25px var(--gold); min-height: 90px; letter-spacing: 5px; }
        .btn-main { width: 100%; background: linear-gradient(45deg, #D1A75D, #B8860B); color: #000; border: none; padding: 18px; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }

        #result-box { margin-top: 25px; display: none; text-align: left; background: rgba(209, 167, 93, 0.05); padding: 25px; border-radius: 20px; border: 1px solid rgba(209,167,93,0.2); animation: fadeIn 0.6s; }
        .res-content { color: #eee; line-height: 1.8; font-size: 1.05rem; white-space: pre-line; }
        .res-content b { color: var(--gold); font-size: 1.25rem; display: block; margin-bottom: 8px; }
        
        .btn-fb { background: #1877F2; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 14px; border-radius: 50px; margin-top: 20px; font-weight: bold; }
        .nav-link { color: #444; text-decoration: none; font-size: 0.8rem; margin-top: 30px; display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="phoenix-image" onclick="getPhoenixOracle()"></div>
    
    <h1 style="letter-spacing: 4px;">金鳳凰解憂站</h1>
    <p style="font-size: 0.85rem; color: #777; margin-top: 5px;">點擊金鳳凰 · 自動感應重生號碼</p>

    <div id="number-display">----</div>
    
    <button class="btn-main" onclick="getPhoenixOracle()">✨ 啟動重生感應 ✨</button>

    <div id="result-box">
        <div class="res-content" id="resContent"></div>
        <a href="#" class="btn-fb" onclick="shareToFB()">🔵 分享啟示 · 傳遞鳳凰好運</a>
    </div>

    <a href="https://www.facebook.com/profile.php?id=61582018845158" target="_blank" class="nav-link">← 返回辛言解憂站 FB 專頁</a>
</div>

<script>
    // (此處保留上一版本 40 組 phoenixData 數據庫，為節省篇幅略過重複顯示)
    const phoenixData = {
        "111": "<b>【鳳凰起飛】</b>\n新的生命週期正在開啟。請保持意念純淨，宇宙正加速顯化你的願望。",
        "414": "<b>【鳳凰之信】</b>\n信者得救。你的信心就是鳳凰重生的柴火，不要讓外界的風吹滅它。",
        // ... (請將上一版本 40 組數據完整貼回此處)
    };

    const keys = Object.keys(phoenixData);

    function getPhoenixOracle() {
        const display = document.getElementById('number-display');
        const resBox = document.getElementById('result-box');
        const resContent = document.getElementById('resContent');

        const selected = keys[Math.floor(Math.random() * keys.length)];
        
        display.innerText = selected;
        resContent.innerHTML = phoenixData[selected];
        resBox.style.display = 'block';
    }

    function shareToFB() {
        const url = encodeURIComponent(window.location.href);
        const quote = encodeURIComponent("我在【金鳳凰解憂站】領取了浴火重生的啟示，能量滿滿！🔥🪷");
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${quote}`, '_blank');
    }
</script>

</body>
</html>
